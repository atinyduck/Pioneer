<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | {{{ PRODUCT_NAME }}}</title>

    <!-- LOAD BRYTHON -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12.0/brython.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.12.0/brython_stdlib.js"></script>

    <style>
      body { padding: 0; margin: 0; overflow: hidden; background-color: #2b2b2b; }
      #unity-container { width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; }
      canvas { width: 100%; height: 100%; display: block; }
    </style>
  </head>
  <body onload="brython()">

    <!-- THE INVISIBLE PYTHON SCRIPT THAT DOES THE TRANSLATING -->
    <script type="text/python" id="player_logic">
from browser import window
import json

def process_player_code(raw_code):
    try:
        # We need a safe local dictionary to trap the player's variables
        safe_locals = {}

        # 1. We create a mock 'API' that the user code can call
        # Every time they call move(), turn(), it adds to a python list.
        command_list = []

        def move():
            command_list.append({"action": "move", "value": 1})

        def turn(x):
            command_list.append({"action": "turn", "value": x})

        def pickup():
            command_list.append({"action": "interact", "value": 0})

        def drop():
            command_list.append({"action": "interact", "value": 0})

        # Inject these functions into the local scope so the player can use them
        safe_locals['move'] = move
        safe_locals['turn'] = turn
        safe_locals['pickup'] = pickup
        safe_locals['drop'] = drop

        # 2. RUN THE PLAYERS CODE
        import builtins
        import ast

        # Combine our safety variables and the player's locals
        safe_globals = {"__builtins__": builtins.__dict__, "__loop_count": 0}

        # --- INFINITE LOOP PROTECTION ---
        # Instead of AST manipulation (which has a bug in this Brython version with comparators),
        # we will dynamically inject a loop counter directly into the user's string
        # before we even hand it to compile().

        loop_protector_code = """
def __check_loop():
    global __loop_count
    __loop_count += 1
    if __loop_count > 1000:
        raise Exception("Infinite Loop Detected! Let's try to fix that.")
"""
        exec(loop_protector_code, safe_globals)

        # Simple string manipulation: insert a `__check_loop()` inside any `while` or `for` block
        # Unity passes tabs as '\t' or spaces. We will normalize '\t' to 4 spaces to avoid Python indentation crashes.
        normalized_code = raw_code.replace('\t', '    ')

        processed_lines = []
        for line in normalized_code.split('\n'):
            processed_lines.append(line)
            stripped = line.strip()
            # If the line is a loop definition, we add __check_loop() right after it
            # We must exactly match its deeper indentation level
            if stripped.startswith("while ") and stripped.endswith(":"):
                indent = line[:len(line) - len(line.lstrip())]
                processed_lines.append(indent + "    __check_loop()")
            elif stripped.startswith("for ") and stripped.endswith(":"):
                indent = line[:len(line) - len(line.lstrip())]
                processed_lines.append(indent + "    __check_loop()")

        safe_code_string = "\n".join(processed_lines)

        # 3. Execute the safe code!
        exec(safe_code_string, safe_globals, safe_locals)

        # 3. Return the results as a JSON string
        result_dict = {"commands": command_list}
        return json.dumps(result_dict)

    except Exception as e:
        import traceback
        tb = traceback.format_exc()
        # Grab just the last line of the traceback for a clean error message to show players
        error_lines = tb.strip().split('\n')
        clean_error = error_lines[-1] if len(error_lines) > 0 else str(e)
        return json.dumps({"error": clean_error, "commands": []})

# Bind our python function to the global Javascript window object
# This is how the Unity .jslib file talks to Python!
window.executePlayerCode = process_player_code
    </script>


    <!-- UNITY'S DEFAULT WEBGL LOADER -->
    <div id="unity-container">
      <canvas id="unity-canvas"></canvas>
    </div>
    <script src="Build/{{{ LOADER_FILENAME }}}"></script>
    <script>
      var myGameInstance = null;
      createUnityInstance(document.querySelector("#unity-canvas"), {
        dataUrl: "Build/{{{ DATA_FILENAME }}}",
        frameworkUrl: "Build/{{{ FRAMEWORK_FILENAME }}}",
        codeUrl: "Build/{{{ CODE_FILENAME }}}",
#if MEMORY_FILENAME
        memoryUrl: "Build/{{{ MEMORY_FILENAME }}}",
#endif
#if SYMBOLS_FILENAME
        symbolsUrl: "Build/{{{ SYMBOLS_FILENAME }}}",
#endif
        streamingAssetsUrl: "StreamingAssets",
        companyName: "{{{ COMPANY_NAME }}}",
        productName: "{{{ PRODUCT_NAME }}}",
        productVersion: "{{{ PRODUCT_VERSION }}}",
      }).then((unityInstance) => {
        // We save a reference to the game instance so our Brython script can talk back to it
        myGameInstance = unityInstance;
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
